  </text>
  <text x="190" y="145" font-family="Verdana, Arial, sans-serif" font-size="18" fill="#9aa7bd">
    Vagrant · Ansible · kubeadm · containerd · Calico CNI
  </text>

  <rect x="190" y="175" width="860" height="3" fill="url(#accent)"/>

  <text x="190" y="205" font-family="Verdana, Arial, sans-serif" font-size="15" fill="#6b7891">
    Infrastructure as Code  •  Configuration Management  •  Multi-Node Cluster Automation
  </text>

  <text x="1090" y="240" font-family="Verdana, Arial, sans-serif" font-size="13" fill="#444f63" text-anchor="end">
    devriston.com.pk
  </text>
