---
- name: Ensure .kube directory exists for vagrant user
  file:
    path: /home/vagrant/.kube
    state: directory
    owner: vagrant
    group: vagrant
    mode: '0755'

- name: Copy admin.conf to vagrant kube config
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/vagrant/.kube/config
    remote_src: yes
    owner: vagrant
    group: vagrant
    mode: '0644'

- name: Ensure kubectl works for vagrant user
  lineinfile:
    path: /home/vagrant/.bashrc
    line: 'export KUBECONFIG=$HOME/.kube/config'
    state: present
